<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,300;0,7..72,400;1,7..72,300;1,7..72,400;1,7..72,600&display=swap" rel="stylesheet">
<style>
/* Khai báo font bình thường */
@font-face {
  font-family: 'Averta';
  src: url('Averta-Regular.ttf') format('truetype');
  font-weight: 400; /* Đây là số định danh cho font thường */
  font-style: normal;
}

/* Khai báo font đậm */
@font-face {
  font-family: 'Averta';
  src: url('Averta-Bold.ttf') format('truetype');
  font-weight: 700; /* Đây là số định danh cho font đậm */
  font-style: normal;
}
/* ═══════════════════════════════════════════════════
   NUOY BRAND SYSTEM — Official Colors & Typography
   Primary:   Teal #00B4BC · Blue #4A67AA · Yellow #F8E816
   Secondary: Sky  #1295D8 · Green #97D88A
   Dark bg:   #0E1A2E   Body text: #414042 / #636466
   Typography: Averta + Literata
═══════════════════════════════════════════════════ */
:root{
  --teal:#00B4BC; --blue:#4A67AA; --yellow:#F8E816;
  --sky:#1295D8;  --green:#97D88A;
  --dark:#0E1A2E; --dark2:#142840; --dark3:#1A3050;
  --white:#FFFFFF; --off:#F5F4F0; --cream:#EDE9E0;
  --tx:#414042; --tx2:#636466; --tx3:#808285;
  --lgrey:#BCBEC0; --llgrey:#E6E7E8;
  --border:rgba(65,64,66,.12);
  --ff-sans:'Averta',system-ui,sans-serif;
  --ff-serif:'Literata',Georgia,serif;
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(0,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{
  scroll-behavior:smooth;
  margin:0;
  padding:0;
  overflow-x:hidden;
}

body{
  font-family:var(--ff-sans);
  color:var(--tx);
  background:var(--white);
  font-weight:300;
  margin:0;
  padding:0;
  overflow-x:hidden;
  overflow-y:scroll;
  scrollbar-width:none;
  -ms-overflow-style:none;
  -webkit-font-smoothing:antialiased;
}
body::-webkit-scrollbar{display:none;}


/* LANG */
body[data-lang="vi"] .en{display:none!important}
body[data-lang="en"] .vi{display:none!important}

/* ═══ NUOY 5-COLOR BRAND STRIPE (signature element) ═══ */
.brand-stripe {
  height: 5px;
  background: linear-gradient(90deg, var(--blue) 20%, var(--sky) 40%, var(--teal) 60%, var(--green) 80%, var(--yellow) 100%);
  position: sticky;
  top: 0;
  left: 0;
  right: 0;
  z-index: 300;
}

nav {
  position: sticky;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: rgba(74, 103, 170, .98);
  backdrop-filter: blur(16px);
  box-shadow: 0 1px 0 rgba(0, 180, 188, .15);
}
.nav-inner{
  max-width:1280px;margin:0 auto;padding:0 2.5rem;
  height:66px;display:flex;align-items:center;
  justify-content:space-between;gap:1.5rem;
}
.nav-logo{display:flex;align-items:center;gap:14px;text-decoration:none;flex-shrink:0}
.nav-logomark{
  height:48px;display:flex;align-items:center;flex-shrink:0;
}
.nav-wordmark{display:flex;flex-direction:column;line-height:1.25}
.nav-wordmark strong{
  font-size:12px;font-weight:600;color:var(--white);
  letter-spacing:.08em;text-transform:uppercase;
}
.nav-wordmark span{font-size:10px;color:rgba(255,255,255,.8);letter-spacing:.07em;text-transform:uppercase}
.nav-links{display:flex;list-style:none;gap:0;align-items:center}
.nav-links a{
  display:block;padding:7px 15px;
  color:rgba(255,255,255,.92);text-decoration:none;
  font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  border-radius:5px;transition:color .2s,background .2s;
}
.nav-links a:hover{color:var(--white);background:rgba(255,255,255,.09)}
.nav-links a.active{color:var(--teal)}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.lang-pill{
  display:flex;background:rgba(255,255,255,.1);
  border-radius:22px;padding:2px;
  border:1px solid rgba(255,255,255,.13);
}
.lang-btn{
  padding:4px 13px;border-radius:20px;border:none;
  background:transparent;color:rgba(255,255,255,.5);
  font-size:11px;font-family:var(--ff-sans);font-weight:600;
  letter-spacing:.07em;cursor:pointer;transition:.2s;
}
.lang-btn.active{background:var(--teal);color:var(--dark)}
.btn-cta-nav{
  padding:9px 22px;background:var(--yellow);color:var(--dark);
  border-radius:5px;text-decoration:none;font-size:11px;
  font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  transition:.2s;white-space:nowrap;
}
.btn-cta-nav:hover{background:var(--teal);color:var(--white);transform:translateY(-1px)}

/* ═══ HERO — VIDEO BACKGROUND VERSION ═══ */
.hero{
  min-height:100vh;
  background:var(--dark);
  padding-top:0;
  padding-bottom:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* VIDEO BACKGROUND */
.hero-video-bg {
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;
}
.hero-video-bg video {
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.52;
}
/* Gradient overlay — light, preserves video colors */
.hero-video-overlay {
  position:absolute;
  inset:0;
  z-index:1;
  background:
    linear-gradient(to bottom, rgba(10,18,34,0.45) 0%, rgba(10,18,34,0.10) 30%, rgba(10,18,34,0.10) 60%, rgba(10,18,34,0.72) 100%),
    linear-gradient(to right, rgba(10,18,34,0.35) 0%, transparent 50%, rgba(10,18,34,0.15) 100%);
  pointer-events:none;
}
/* Teal color grade on video */
.hero-video-colorgrade {
  position:absolute;
  inset:0;
  z-index:1;
  background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(0,180,188,0.06) 0%, transparent 65%);
  pointer-events:none;
  mix-blend-mode:screen;
}

/* Fallback placeholder when no video (mock) */
.hero-video-placeholder {
  position:absolute;
  inset:0;
  background:
    linear-gradient(135deg, #0a1628 0%, #0e1a2e 30%, #0d2235 60%, #081525 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:1rem;
}
.hero-video-placeholder-inner {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.75rem;
  opacity:.18;
}
.hero-video-placeholder-inner svg {
  width:64px;height:64px;fill:var(--teal);
}
.hero-video-placeholder-inner span {
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--teal);font-weight:600;
}
/* Simulated video grain texture */
.hero-video-placeholder::after {
  content:'';
  position:absolute;inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.06;pointer-events:none;
}

/* Decorative horizontal lines (cinematic bars) */
.hero-video-bg::after {
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:120px;
  background:linear-gradient(to top, rgba(10,18,34,0.85) 0%, transparent 100%);
  z-index:2;pointer-events:none;
}

/* Radial light bleeds */
.hero-glow{
  position:absolute;inset:0;pointer-events:none;z-index:2;
  background:
    radial-gradient(ellipse 65% 55% at 65% 40%,rgba(0,180,188,.10) 0%,transparent 55%),
    radial-gradient(ellipse 40% 60% at 5%  75%,rgba(74,103,170,.10) 0%,transparent 50%);
}
/* Geometric ring — Nuoy icon language */
/* hero-ring removed */
.hero-inner{
  max-width:860px;margin:0 auto;width:100%;
  padding:0 2.5rem;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  position:relative;z-index:4;
  height:100%;
}
.hero-h1{
  font-family:var(--ff-serif);
  font-size:clamp(2.2rem,5.5vw,5rem);
  font-weight:400;line-height:1.05;
  color:var(--white);letter-spacing:-.02em;
  white-space:nowrap;margin-bottom:.4rem;
  opacity:0;animation:fadeSlideUp 1s cubic-bezier(0,0,.2,1) forwards;animation-delay:.55s;
}
.hero-h1 em{font-style:italic;color:var(--white)}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hero-welcome-accent{
  font-family:var(--ff-serif);font-size:clamp(.8rem,1.4vw,.95rem);
  font-weight:300;font-style:italic;color:rgba(255,255,255,.75);
  letter-spacing:.06em;margin-bottom:1rem;
  opacity:0;animation:fadeSlideUp .8s cubic-bezier(0,0,.2,1) forwards;animation-delay:.3s;
}
.hero-venue-date{
  font-family:var(--ff-serif);font-size:clamp(1rem,2.2vw,1.8rem);
  font-weight:400;font-style:italic;color:rgba(255,255,255,.45);
  letter-spacing:-.01em;margin-bottom:1.4rem;
  opacity:0;animation:fadeSlideUp .9s cubic-bezier(0,0,.2,1) forwards;animation-delay:.72s;
}
.hero-rule{
  width:0;height:1px;
  background:linear-gradient(to right,transparent,var(--teal),transparent);
  margin:0 auto 1.5rem;
  animation:expandRule .9s cubic-bezier(0,0,.2,1) forwards;animation-delay:.9s;
}
@keyframes expandRule{to{width:200px}}
/* Scroll indicator */
.hero-scroll-hint {
  position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);
  z-index:5;display:flex;flex-direction:column;align-items:center;gap:8px;
  opacity:.4;animation:scrollbob 2.5s ease-in-out infinite;
}
@keyframes scrollbob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}
.hero-scroll-hint svg{width:20px;height:20px;fill:var(--teal)}
.hero-scroll-hint span{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal)}

/* eyebrow */
.hero-eyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:1.75rem}
.eyebrow-dot{
  width:9px;height:9px;background:var(--teal);border-radius:50%;
  animation:dotpulse 2.5s ease-in-out infinite;
}
@keyframes dotpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}
.eyebrow-text{
  font-size:11px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;color:var(--teal);
}

/* main heading */
.hero-h1{
  font-family:var(--ff-serif);
  font-size:clamp(2.2rem,3.8vw,3.3rem);
  font-weight:400;line-height:1.08;
  color:var(--white);margin-bottom:.75rem;
  letter-spacing:-.01em;
}
.hero-h1 em{font-style:normal;color:var(--white)}
  .hero-venue-date {
  font-family: var(--ff-serif);
  font-size: clamp(1.1rem, 1.8vw, 1.3rem);
  font-weight: 400;
  color: rgba(255, 255, 255, 0.7);
  margin-top: 0.5rem;
  margin-bottom: 1.5rem;
  letter-spacing: 0.02em;
}

/* subtitle — Literata italic like Nuoy secondary type */
.hero-sub{
  font-family:var(--ff-serif);
  font-size:clamp(.95rem,1.5vw,1.15rem);
  font-weight:300;font-style:italic;
  color:rgba(255,255,255,.85);
  margin-bottom:.5rem;line-height:1.6;
}

/* slogan — ALL CAPS Literata style */
.hero-slogan{
  font-size:11px;font-weight:500;letter-spacing:.12em;
  text-transform:uppercase;color:rgba(255,255,255,.3);
  margin-bottom:2.75rem;
  padding-left:14px;border-left:2px solid var(--teal);
}

/* meta items */
.hero-meta{display:flex;flex-direction:column;gap:13px;margin-bottom:2.75rem}
.hm{display:flex;align-items:flex-start;gap:13px}
.hm-icon{
  width:34px;height:34px;border-radius:8px;
  background:rgba(0,180,188,.13);border:1px solid rgba(0,180,188,.22);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.hm-icon svg{width:16px;height:16px;fill:var(--teal)}
.hm-txt strong{display:block;color:var(--white);font-size:13px;font-weight:500;line-height:1.3}
.hm-txt span{color:rgba(255,255,255,.38);font-size:11px;font-weight:300}

/* buttons */
.hero-btns{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.btn-primary{
  padding:14px 32px;background:var(--yellow);color:var(--dark);
  border-radius:5px;text-decoration:none;font-size:12px;
  font-weight:600;letter-spacing:.07em;text-transform:uppercase;
  transition:.25s;display:inline-flex;align-items:center;gap:8px;
}
.btn-primary:hover{background:var(--teal);color:var(--white);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,180,188,.25)}
.btn-ghost{
  padding:14px 28px;background:transparent;
  color:rgba(255,255,255,.65);
  border:1px solid rgba(255,255,255,.18);border-radius:5px;
  text-decoration:none;font-size:12px;font-weight:500;
  letter-spacing:.06em;text-transform:uppercase;transition:.25s;
}
.btn-ghost:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.35);color:var(--white)}

/* countdown card */
.hero-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(0,180,188,.2);
  border-radius:16px;padding:1.5rem;
}
.hc-label{
  font-size:10px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;color:var(--teal);margin-bottom:1.25rem;
}
.countdown{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:6px;margin-bottom:1.5rem;
}
.cd{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.07);
  border-radius:10px;padding:.85rem .4rem;text-align:center;
}
.cd-n{
  font-family:var(--ff-serif);font-size:1.8rem;
  font-weight:400;color:var(--white);line-height:1;
  display:block;margin-bottom:4px;
}
.cd-l{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.08em;text-transform:uppercase}
.hc-divider{height:1px;background:rgba(255,255,255,.07);margin-bottom:1.25rem}
.hc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.hcs{text-align:center;padding:.65rem 0}
.hcs strong{
  display:block;font-family:var(--ff-serif);font-size:1.5rem;
  font-weight:400;color:var(--teal);line-height:1;
}
.hcs span{
  font-size:10px;color:rgba(255,255,255,.35);
  line-height:1.4;display:block;margin-top:4px;
}

/* ═══ SCROLLING BANNER ═══ */
.banner{
  background:var(--dark2);padding:10px 0;overflow:hidden;
  border-top:1px solid rgba(0,180,188,.18);
  border-bottom:1px solid rgba(0,180,188,.18);
}
.banner-track{
  display:flex;gap:2.5rem;
  animation:marquee 35s linear infinite;white-space:nowrap;
}
.banner-track:hover{animation-play-state:paused}
.bi{
  display:inline-flex;align-items:center;gap:10px;
  font-size:12px;font-weight:400;letter-spacing:.04em;
  color:rgba(255,255,255,.65);flex-shrink:0;
}
.bi-sep{color:var(--teal);font-size:9px;margin:0 5px;opacity:.65;}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ═══ FACULTY SECTION ═══ */
.faculty-section{
  background:var(--white);
  padding:5rem 2.5rem;
}
.faculty-section .si{max-width:1280px;margin:0 auto}
.faculty-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1.75rem 1.25rem;
  margin-top:3rem;
}
.faculty-card{
  display:flex;flex-direction:column;align-items:center;text-align:center;
}
.faculty-photo{
  width:80%;aspect-ratio:3/4;
  object-fit:cover;object-position:top center;
  border-radius:7px;
  display:block;
  margin-bottom:0.7rem;
  background:var(--llgrey);
}
.faculty-name{
  font-size:12px;font-weight:600;
  color:var(--dark);line-height:1.3;
  margin-bottom:2px;
}
.faculty-inst{
  font-size:10.5px;color:var(--tx2);
  line-height:1.5;font-weight:300;
}
@media(max-width:1024px){.faculty-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.faculty-grid{grid-template-columns:repeat(2,1fr)!important}}

/* ═══ SECTION BASE ═══ */
section{padding:6rem 2.5rem}
.si{max-width:1280px;margin:0 auto}

/* eyebrow label */
.sec-eyebrow{
  display:inline-flex;align-items:center;gap:10px;
  font-size:10px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;color:var(--teal);margin-bottom:1rem;
}
.sec-eyebrow::before{content:'';width:20px;height:2px;background:var(--teal);border-radius:2px}

/* heading — Literata serif for display (rule 1 of Nuoy typography) */
h2.sec-h2{
  font-family:var(--ff-serif);
  font-size:clamp(1.8rem,3vw,2.7rem);
  font-weight:400;line-height:1.15;
  color:var(--dark);margin-bottom:1.1rem;letter-spacing:-.01em;
}
h2.sec-h2 em{font-style:italic;color:var(--teal)}

/* body — Averta light weight 400 (rule 3 of Nuoy typography) */
.sec-body{
  font-family: var(--ff-sans);
  font-size: 1rem; color: var(--tx2);
  line-height: 1.85; max-width: 650px; font-weight: 400;
}

/* ═══ ABOUT ═══ */
.about{background:var(--off)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:5.5rem;align-items:center}

/* Image block with Nuoy geometric frame */
.about-visual{position:relative}
.about-imgbox{
  width:100%;aspect-ratio:4/3;
  background:linear-gradient(135deg,var(--dark2) 0%,var(--dark3) 100%);
  border-radius:14px;overflow:hidden;position:relative;
  display:flex;align-items:center;justify-content:center;
}
/* Nuoy icon as duotone watermark (icon usage guideline) */
.about-icon-wm{
  position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;opacity:.07;
}
.about-icon-wm svg{width:140px;fill:var(--teal)}
/* gradient overlay */
.about-imgbox::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 35%,rgba(14,26,46,.75) 100%);
}
.about-caption{
  position:absolute;bottom:1.5rem;left:1.5rem;right:1.5rem;
  z-index:2;color:var(--white);
}
.about-caption strong{
  font-family:var(--ff-serif);font-size:1.1rem;
  font-weight:400;font-style:italic;display:block;
  line-height:1.3;margin-bottom:3px;
}
.about-caption span{font-size:11px;opacity:.6;letter-spacing:.04em}


/* features */
.about-features{display:flex;flex-direction:column;gap:1.5rem;margin-top:2rem}
.af{display:flex;gap:14px;align-items:flex-start}
.af-mark{
  width:10px;height:10px;background:var(--teal);
  border-radius:50%;flex-shrink:0;margin-top:5px;
}
.af h4{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:4px;letter-spacing:.01em}
.af p{font-size:13px;color:var(--tx2);line-height:1.7;font-weight:300}

.btn-teal{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:2.25rem;padding:13px 28px;
  background:var(--teal);color:var(--dark);border-radius:5px;
  text-decoration:none;font-size:12px;font-weight:600;
  letter-spacing:.07em;text-transform:uppercase;transition:.25s;
}
.btn-teal:hover{background:var(--sky);color:var(--white);transform:translateY(-1px)}

/* ═══ CONTEXT ═══ */
.context{background:var(--dark)}
.context .sec-eyebrow{color:var(--yellow)}
.context .sec-eyebrow::before{background:var(--yellow)}
.context h2.sec-h2{color:var(--white)}
.context h2.sec-h2 em{color:var(--teal)}
.context .sec-body{color:rgba(255,255,255,.5)}
.ctx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;margin-top:3.5rem}
.ctx-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:2rem;
  transition:.3s var(--ease);
}
.ctx-card:hover{background:rgba(0,180,188,.07);border-color:rgba(0,180,188,.28)}
/* Large stat number — Literata display use */
.ctx-n{
  font-family:var(--ff-serif);font-size:2.9rem;
  font-weight:400;font-style:italic;color:var(--teal);
  line-height:1;margin-bottom:.6rem;
}
.ctx-card h4{
  font-size:12px;font-weight:600;color:var(--white);
  margin-bottom:.5rem;letter-spacing:.08em;text-transform:uppercase;
}
.ctx-card p{font-size:13px;color:rgba(255,255,255,.45);line-height:1.75;font-weight:300}

/* ═══ GOALS ═══ */
.goals{background:var(--white)}
.goals-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.25rem;margin-top:3.5rem}
.goal{
  display:flex;gap:1.25rem;align-items:flex-start;
  padding:1.75rem 1.75rem;
  border:1px solid var(--border);border-radius:12px;
  transition:.25s var(--ease);
}
.goal:hover{border-color:var(--teal);background:rgba(0,180,188,.03)}
/* Numbered display — Literata italic ghost number */
.goal-n{
  font-family:var(--ff-serif);font-size:2.4rem;
  font-weight:400;font-style:italic;
  color:rgba(14,26,46,.07);line-height:1;
  flex-shrink:0;width:48px;
}
.goal h4{
  font-size:12px;font-weight:600;color:var(--dark);
  margin-bottom:6px;letter-spacing:.07em;text-transform:uppercase;
}
.goal p{font-size:13px;color:var(--tx2);line-height:1.7;font-weight:300}

/* ═══ AUDIENCE ═══ */
.audience{background:var(--off)}
.aud-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:3.5rem}
.aud{
  background:var(--white);border:1px solid var(--border);
  border-radius:11px;padding:1.75rem;text-align:center;
  transition:.25s var(--ease);
}
.aud:hover{border-color:var(--teal);transform:translateY(-4px);box-shadow:0 12px 28px rgba(14,26,46,.08)}
/* Icon container — Nuoy icon usage guideline */
.aud-icon{
  width:50px;height:50px;background:rgba(0,180,188,.1);
  border-radius:11px;display:flex;align-items:center;
  justify-content:center;margin:0 auto 1.1rem;
}
.aud-icon svg{width:22px;height:22px;fill:var(--teal)}
.aud h4{font-size:13px;font-weight:600;color:var(--dark);line-height:1.45;letter-spacing:.01em}

/* ═══ PRICING ═══ */
.pricing{background:var(--dark)}
.pricing .sec-eyebrow{color:var(--yellow)}
.pricing .sec-eyebrow::before{background:var(--yellow)}
.pricing h2.sec-h2{color:var(--white)}
.pricing h2.sec-h2 em{color:var(--teal)}
.pricing .sec-body{color:rgba(255,255,255,.5)}

.ptab-wrap{margin-top:3rem;overflow-x:auto}
.ptab{width:100%;border-collapse:collapse;min-width:700px}
.ptab thead tr{border-bottom:1px solid rgba(255,255,255,.1)}
.ptab th{
  padding:13px 20px;font-size:10px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
}
.ptab th:first-child{text-align:left;color:rgba(255,255,255,.35)}
.ptab th:not(:first-child){text-align:center;color:var(--yellow)}
.ptab td{
  padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.05);
  font-size:13px;vertical-align:top;
}
.ptab td:first-child{color:rgba(255,255,255,.75);line-height:1.55;font-weight:300}
.ptab td:first-child small{display:block;font-size:11px;color:rgba(255,255,255,.3);margin-top:3px;font-weight:300}
.ptab td:not(:first-child){
  text-align:center;font-family:var(--ff-serif);
  font-size:1.25rem;font-weight:400;color:var(--teal);
}
.ptab tr.hilite td{background:rgba(0,180,188,.07)}
.ptab tr:last-child td{border-bottom:none}

.price-note{
  margin-top:1.75rem;padding:1.5rem 1.75rem;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-radius:10px;font-size:13px;
  color:rgba(255,255,255,.45);line-height:1.85;font-weight:300;
}
.price-note strong{color:rgba(255,255,255,.75);font-weight:500}
.cancel-note{
  margin-top:1rem;padding-left:16px;
  border-left:3px solid rgba(0,180,188,.4);
  font-size:13px;color:rgba(255,255,255,.35);
  line-height:1.75;font-weight:300;
}
.cancel-note strong{color:rgba(255,255,255,.6);font-weight:500}

/* ═══ SUPPORTERS ═══ */
.supporters{background:var(--cream);padding:4.5rem 2.5rem;text-align:center}
.sup-flex{
  display:flex;flex-wrap:wrap;gap:1.25rem;
  justify-content:center;align-items:center;margin-top:2.75rem;
}
.sup-chip{
  padding:0 20px;background:transparent;
  border:none;border-radius:0;
  display:flex;align-items:center;justify-content:center;
  height:60px;
  transition:.2s;
}
.sup-chip:hover{box-shadow:none}
.sup-chip img{
  width:auto;height:100%;max-width:160px;
  object-fit:contain;display:block;
}
.sup-chip.logo-lg img{
  height:160px;max-width:360px;
}

/* ═══ CTA STRIP ═══ */
.cta-strip{
  background:var(--dark2);padding:6.5rem 2.5rem;
  text-align:center;position:relative;overflow:hidden;
}
.cta-strip::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 80% at 50% 50%,rgba(0,180,188,.08) 0%,transparent 60%);
  pointer-events:none;
}
.cta-strip .sec-eyebrow{justify-content:center;color:var(--yellow)}
.cta-strip .sec-eyebrow::before{background:var(--yellow)}
.cta-strip h2.sec-h2{color:var(--white);max-width:480px;margin:0 auto 1rem}
.cta-strip h2.sec-h2 em{color:var(--teal)}
.cta-body{
  font-size:1rem;color:rgba(255,255,255,.45);
  max-width:500px;margin:0 auto 2.75rem;
  line-height:1.85;font-weight:300;
}
.cta-btns{
  display:flex;align-items:center;justify-content:center;
  gap:12px;flex-wrap:wrap;margin-bottom:1.75rem;
}
.cta-contact{font-size:13px;color:rgba(255,255,255,.3)}
.cta-contact a{color:var(--teal);text-decoration:none;transition:.2s}
.cta-contact a:hover{color:var(--yellow)}

/* ═══ FOOTER ═══ */
footer{background:#2d4a8a;padding:4rem 2.5rem 2.25rem}
.foot-wrap{max-width:1280px;margin:0 auto}
/* Nuoy 5-color stripe inside footer (brand signature) */
.foot-stripe{
  height:4px;
  background:linear-gradient(90deg,
    var(--blue)  0%   20%,
    var(--sky)   20%  40%,
    var(--teal)  40%  60%,
    var(--green) 60%  80%,
    var(--yellow)80%  100%);
  border-radius:2px;margin-bottom:3rem;
}
.foot-grid{
  display:grid;grid-template-columns:2fr 1fr 1fr;gap:3.5rem;
  padding-bottom:2.5rem;border-bottom:1px solid rgba(255,255,255,.06);
  margin-bottom:1.75rem;
}
.foot-brand p{
  font-size:13px;line-height:1.8;
  color:rgba(255,255,255,.65);margin-top:1rem;

}
.foot-col h5{
  font-size:10px;font-weight:600;letter-spacing:.12em;

}
.foot-col ul{list-style:none;display:flex;flex-direction:column;gap:7px}
.foot-col a{
  font-size:13px;color:rgba(255,255,255,.65);

}
.foot-col a:hover{color:var(--white)}
.foot-bottom{
  display:flex;justify-content:space-between;align-items:center;

  flex-wrap;gap:.5rem;
}
.foot-bottom a{color:rgba(255,255,255,.5);text-decoration:none;transition:.2s}
.foot-bottom a:hover{color:rgba(255,255,255,.5)}

/* ═══ SCROLL REVEAL ═══ */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s var(--ease-out),transform .7s var(--ease-out)}
.reveal.in{opacity:1;transform:none}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}


img{

.hamburger{

<script>
var _bc;
try{ _bc=new BroadcastChannel('icms-lang'); }catch(e){}

function setLang(l){
  document.body.setAttribute('data-lang',l);
  localStorage.setItem('icms-lang',l);

  /* Desktop lang buttons */
  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.classList.toggle('active', b.textContent.trim().toLowerCase()===l);
  });

  /* Mobile lang buttons */
  var en=document.getElementById('mlang-en');
  var vi=document.getElementById('mlang-vi');
  if(en) en.classList.toggle('active',l==='en');
  if(vi) vi.classList.toggle('active',l==='vi');

  /* Broadcast to other iframes */
  try{ if(_bc) _bc.postMessage({lang:l}); }catch(e){}
  try{ window.parent.postMessage({type:'icms-lang',lang:l},'*'); }catch(e){}
}
(function(){
  setLang(localStorage.getItem('icms-lang')||'en');
})();
function toggleMenu(){
  var btn=document.getElementById('hamburger');
  var menu=document.getElementById('mobile-menu');
  if(btn) btn.classList.toggle('open');
  if(menu) menu.classList.toggle('open');
}
var navEl=document.getElementById('nav');
if(navEl){
  window.addEventListener('scroll',function(){
    navEl.classList.toggle('scrolled',window.scrollY>10);
  },{passive:true});
}
</script>
